<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BI Financeiro - Amerinode 2026</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Tahoma,sans-serif; background:#0a1628; color:#e0e0e0; min-height:100vh; }
.header { background:linear-gradient(135deg,#0d1f3c 0%,#162d50 100%); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid #c0392b; }
.header h1 { font-size:20px; font-weight:700; color:#fff; letter-spacing:1px; }
.header .subtitle { font-size:12px; color:#8899aa; margin-top:2px; }
.header-right { display:flex; align-items:center; gap:16px; }
.meta-box { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.06); border:1px solid #2a3f5f; border-radius:6px; padding:6px 14px; }
.meta-box label { font-size:11px; color:#8899aa; text-transform:uppercase; letter-spacing:0.5px; }
.meta-box input { width:130px; background:transparent; border:none; border-bottom:1px solid #c0392b; color:#fff; font-size:14px; font-weight:600; text-align:right; outline:none; padding:2px 0; }
.update-info { font-size:11px; color:#5a7a9a; }
.filters { padding:12px 28px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.filters label { font-size:11px; color:#8899aa; margin-right:6px; text-transform:uppercase; letter-spacing:0.5px; }
.fbtn { padding:6px 16px; border-radius:20px; border:1px solid #2a3f5f; background:transparent; color:#b0c4de; font-size:12px; font-weight:500; cursor:pointer; transition:all .2s; }
.fbtn:hover { border-color:#c0392b; color:#fff; }
.fbtn.active { background:#c0392b; border-color:#c0392b; color:#fff; font-weight:600; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; padding:16px 28px; }
.card { background:linear-gradient(135deg,#0f2240 0%,#162d50 100%); border-radius:10px; padding:18px 20px; border-left:4px solid #c0392b; position:relative; overflow:hidden; }
.card::after { content:''; position:absolute; top:0; right:0; width:60px; height:60px; background:radial-gradient(circle at top right,rgba(192,57,43,0.12),transparent); }
.card .label { font-size:11px; color:#8899aa; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.card .value { font-size:26px; font-weight:700; color:#fff; }
.card .sub { font-size:12px; margin-top:4px; }
.card .sub.up { color:#27ae60; }
.card .sub.down { color:#e74c3c; }
.card .sub.neutral { color:#8899aa; }
.card.meta-card { border-left-color:#f39c12; }
.card.meta-card .bar-bg { height:6px; background:#1a2a44; border-radius:3px; margin-top:10px; }
.card.meta-card .bar-fill { height:6px; border-radius:3px; transition:width .5s; }
.chart-section { padding:8px 28px 16px; }
.chart-box { background:#0f2240; border-radius:10px; padding:16px; margin-bottom:16px; }
.chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.chart-title { font-size:14px; font-weight:600; color:#fff; }
.toggle-group { display:flex; gap:0; }
.toggle-btn { padding:5px 16px; font-size:11px; border:1px solid #2a3f5f; background:transparent; color:#b0c4de; cursor:pointer; transition:all .2s; }
.toggle-btn:first-child { border-radius:4px 0 0 4px; }
.toggle-btn:last-child { border-radius:0 4px 4px 0; }
.toggle-btn.active { background:#c0392b; border-color:#c0392b; color:#fff; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:900px){ .grid-2{grid-template-columns:1fr;} }
.table-box { background:#0f2240; border-radius:10px; padding:16px; margin-top:16px; }
.table-box h3 { font-size:13px; color:#fff; margin-bottom:10px; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { background:#162d50; color:#8899aa; text-transform:uppercase; letter-spacing:0.5px; padding:8px 10px; text-align:right; font-weight:600; font-size:10px; }
th:first-child { text-align:left; }
td { padding:7px 10px; border-bottom:1px solid #1a2a44; text-align:right; color:#d0d8e0; }
td:first-child { text-align:left; color:#fff; font-weight:500; }
tr:hover td { background:rgba(192,57,43,0.06); }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>BI FINANCEIRO &mdash; AMERINODE 2026</h1>
    <div class="subtitle">Consolidação de Faturamento por PMO e Warehouse</div>
  </div>
  <div class="header-right">
    <div class="meta-box">
      <label>Meta Semanal</label>
      <input type="text" id="metaInput" value="375.000,00" onchange="updateMeta()">
    </div>
    <div class="update-info">Atualizado: 29/03/2026</div>
  </div>
</div>

<div class="filters">
  <label>Cliente / PMO:</label>
  <button class="fbtn active" onclick="setFilter('Todos')">Todos</button>
  <button class="fbtn" onclick="setFilter('VIVO REPARO')">VIVO REPARO</button>
  <button class="fbtn" onclick="setFilter('VITAL')">VITAL</button>
  <button class="fbtn" onclick="setFilter('MILETO')">MILETO</button>
  <button class="fbtn" onclick="setFilter('VIVO N3')">VIVO N3</button>
  <button class="fbtn" onclick="setFilter('VIVO SPM')">VIVO SPM</button>
</div>

<div class="cards" id="cardsContainer"></div>

<div class="chart-section">
  <div class="chart-box">
    <div class="chart-header">
      <span class="chart-title">Evolução do Faturamento</span>
      <div class="toggle-group">
        <button class="toggle-btn active" onclick="setView('weekly')">Semanal</button>

      </div>
    </div>
    <div id="evolutionChart" style="height:340px;"></div>

  <div class="grid-2">
    <div class="chart-box">
      <div class="chart-title" style="margin-bottom:12px;">Faturamento por PMO</div>
      <div id="pmoChart" style="height:300px;"></div>
    </div>
    <div class="chart-box">
      <div class="chart-title" style="margin-bottom:12px;">Faturamento por Warehouse</div>
      <div id="whChart" style="height:340px;"></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="table-box">
      <h3>Detalhamento Mensal por PMO</h3>
      <div id="monthlyTable"></div>
    </div>
    <div class="table-box">
      <h3>Detalhamento Mensal por Warehouse</h3>
      <div id="whTable"></div>

</div>

63708.02, "SPM Regional SP": 402903.32, "Sta Rita": 278879.09}, "2026-03": {"JDI Remanufatura": 0, "Jaguare": 45882.95, "Jundiaí": 375214.99, "Reparo Terceiros": 115744.82, "Rio de Janeiro (Remanufatura)": 893276.8, "SPM BBN": 175700.13, "SPM Regional SP": 380671.41, "Sta Rita": 405631.06}}}};

let currentFilter = 'Todos';
let currentView = 'weekly';
let weeklyTarget = DATA.weekly_target;

const PMO_COLORS = {
  'VIVO REPARO':'#c0392b','VITAL':'#2980b9','MILETO':'#8e44ad',
  'VIVO N3':'#27ae60','VIVO SPM':'#f39c12'
};
const WH_COLORS = ['#c0392b','#2980b9','#27ae60','#f39c12','#8e44ad','#1abc9c','#e67e22','#3498db'];
const MONTH_NAMES = {'01':'Jan','02':'Fev','03':'Mar','04':'Abr','05':'Mai','06':'Jun','07':'Jul','08':'Ago','09':'Set','10':'Out','11':'Nov','12':'Dez'};

function fmtBRL(v) {
  if(v==null||isNaN(v)) return 'R$ 0,00';
  return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtK(v) {
  if(v>=1000000) return (v/1000000).toLocaleString('pt-BR',{maximumFractionDigits:1})+'M';
  if(v>=1000) return (v/1000).toLocaleString('pt-BR',{maximumFractionDigits:0})+'K';
  return v.toLocaleString('pt-BR',{maximumFractionDigits:0});
}
function pct(a,b) { return b?((a-b)/b*100):0; }
function pctStr(v) { return (v>=0?'+':'')+v.toFixed(1)+'%'; }
function fmtMonth(m) { var p=m.split('-'); return MONTH_NAMES[p[1]]+'/'+p[0].slice(2); }
function fmtWeek(w) { return w.replace('2026-',''); }

function getWVal(wk) {
  if(currentFilter==='Todos') return DATA.weekly.total[wk]||0;
  return (DATA.weekly.by_pmo[wk]||{})[currentFilter]||0;
}
function getMVal(mo) {
  if(currentFilter==='Todos') return DATA.monthly.total[mo]||0;
  return (DATA.monthly.by_pmo[mo]||{})[currentFilter]||0;
}

const layoutBase = {
  paper_bgcolor:'transparent',plot_bgcolor:'transparent',
  font:{color:'#b0c4de',size:11},
  margin:{l:60,r:20,t:10,b:40},
  xaxis:{gridcolor:'#1a2a44',linecolor:'#1a2a44',tickfont:{size:10}},
  yaxis:{gridcolor:'#1a2a44',linecolor:'#1a2a44',tickfont:{size:10},tickprefix:'R$ ',separatethousands:true},
  legend:{orientation:'h',y:-0.15,font:{size:10}},
  hovermode:'x unified'
};

function renderCards() {
  const weeks=DATA.weeks, months=DATA.months;
  let totalAcum=0; months.forEach(m=>totalAcum+=getMVal(m));
  const lw=weeks[weeks.length-1], pw=weeks[weeks.length-2];
  const lwv=getWVal(lw), pwv=getWVal(pw), wvar=pct(lwv,pwv);
  const lm=months[months.length-1], pm=months.length>1?months[months.length-2]:null;
  const lmv=getMVal(lm), pmv=pm?getMVal(pm):0, mvar=pm?pct(lmv,pmv):0;
  const mpct=weeklyTarget>0?(lwv/weeklyTarget*100):0;
  const mc=mpct>=100?'#27ae60':mpct>=80?'#f39c12':'#e74c3c';
  let sw=0,sumW=0; weeks.forEach(w=>{const v=getWVal(w);if(v>0){sw++;sumW+=v;}});
  const avg=sw>0?sumW/sw:0;
  document.getElementById('cardsContainer').innerHTML=`
    <div class="card">
      <div class="label">Faturamento Acumulado 2026</div>
      <div class="value">${fmtBRL(totalAcum)}</div>
      <div class="sub neutral">${months.length} meses</div>
    </div>
    <div class="card">
      <div class="label">Último Mês (${fmtMonth(lm)})</div>
      <div class="value">${fmtBRL(lmv)}</div>
      <div class="sub ${mvar>=0?'up':'down'}">${pm?pctStr(mvar)+' vs '+fmtMonth(pm):''}</div>
    </div>
    <div class="card">
      <div class="label">Última Semana (${fmtWeek(lw)})</div>
      <div class="value">${fmtBRL(lwv)}</div>
      <div class="sub ${wvar>=0?'up':'down'}">${pctStr(wvar)} vs ${fmtWeek(pw)}</div>
    </div>
    <div class="card">
      <div class="label">Média Semanal</div>
      <div class="value">${fmtBRL(avg)}</div>
      <div class="sub neutral">${sw} semanas com faturamento</div>
    </div>
    <div class="card meta-card">
      <div class="label">Meta Semanal</div>
      <div class="value">${fmtBRL(weeklyTarget)}</div>
      <div class="sub" style="color:${mc}">${fmtWeek(lw)}: ${mpct.toFixed(1)}% da meta</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(mpct,100)}%;background:${mc};"></div></div>
    </div>`;
}

function renderEvolution() {
  const div=document.getElementById('evolutionChart');
  const isW=currentView==='weekly';
  const keys=isW?DATA.weeks:DATA.months;
  const labels=keys.map(k=>isW?fmtWeek(k):fmtMonth(k));
  const yv=keys.map(k=>isW?getWVal(k):getMVal(k));
  const vari=[0,...yv.slice(1).map((v,i)=>pct(v,yv[i]))];
  const vtxt=vari.map((v,i)=>i===0?'':pctStr(v));
  const bc=yv.map(v=>isW&&v>=weeklyTarget?'#27ae60':'#c0392b');
  const traces=[
    {x:labels,y:yv,type:'bar',name:'Faturamento',marker:{color:bc,opacity:0.85},
      text:yv.map(v=>fmtK(v)),textposition:'outside',textfont:{size:9,color:'#8899aa'},
      hovertemplate:'%{x}<br>R$ %{y:,.2f}<extra></extra>'},
    {x:labels,y:vari,type:'scatter',mode:'lines+markers+text',name:'Variação %',yaxis:'y2',
      line:{color:'#f39c12',width:2},marker:{size:5,color:'#f39c12'},
      text:vtxt,textposition:'top center',textfont:{size:9,color:'#f39c12'},
      hovertemplate:'%{x}: %{text}<extra></extra>'},
  ];
  if(isW) traces.push({x:labels,y:labels.map(()=>weeklyTarget),type:'scatter',mode:'lines',
    name:'Meta',line:{color:'#fff',width:1,dash:'dot'},hoverinfo:'skip'});
  const layout={...layoutBase,
    yaxis:{...layoutBase.yaxis,title:'Faturamento (R$)'},
    yaxis2:{overlaying:'y',side:'right',showgrid:false,ticksuffix:'%',
      gridcolor:'transparent',linecolor:'transparent',tickfont:{size:9,color:'#f39c12'},zeroline:false},
    barmode:'group',showlegend:true};
  Plotly.react(div,traces,layout,{responsive:true,displayModeBar:false});
}

function renderPMO() {
  const div=document.getElementById('pmoChart');
  const isW=currentView==='weekly';
  const keys=isW?DATA.weeks:DATA.months;
  const labels=keys.map(k=>isW?fmtWeek(k):fmtMonth(k));
  const bp=isW?DATA.weekly.by_pmo:DATA.monthly.by_pmo;
  const pmos=currentFilter==='Todos'?DATA.pmos:[currentFilter];
  const traces=pmos.map(p=>({
    x:labels,y:keys.map(k=>(bp[k]||{})[p]||0),type:'bar',name:p,
    marker:{color:PMO_COLORS[p]||'#666'},
    hovertemplate:p+'<br>R$ %{y:,.2f}<extra></extra>'
  }));
  Plotly.react(div,traces,{...layoutBase,barmode:'stack',showlegend:true},{responsive:true,displayModeBar:false});
}

function renderWarehouse() {
  const div=document.getElementById('whChart');
  let totals={};
  DATA.warehouses.forEach(w=>{totals[w]=0;});
  DATA.months.forEach(m=>{
    const wd=DATA.monthly.by_warehouse[m]||{};
    DATA.warehouses.forEach(w=>{totals[w]+=(wd[w]||0);});
  });
  const items=Object.entries(totals).filter(([,v])=>v>0).sort((a,b)=>a[1]-b[1]);
  const trace={
    y:items.map(x=>x[0]),x:items.map(x=>x[1]),type:'bar',orientation:'h',
    marker:{color:items.map((_,i)=>WH_COLORS[i%WH_COLORS.length]),opacity:0.9},
    text:items.map(x=>fmtBRL(x[1])),textposition:'outside',
    textfont:{size:10,color:'#b0c4de'},
    hovertemplate:'%{y}<br>%{text}<extra></extra>',cliponaxis:false
  };
  const layout={paper_bgcolor:'transparent',plot_bgcolor:'transparent',
    font:{color:'#b0c4de',size:11},margin:{l:190,r:100,t:25,b:30},
    xaxis:{gridcolor:'#1a2a44',linecolor:'#1a2a44',tickfont:{size:9,color:'#5a7a9a'},showticklabels:false,zeroline:false},
    yaxis:{tickfont:{size:11,color:'#d0d8e0'},gridcolor:'transparent',linecolor:'transparent',automargin:true},
    showlegend:false,
    annotations:[{x:0.5,y:1.06,xref:'paper',yref:'paper',text:'Acumulado 2026',showarrow:false,font:{size:10,color:'#8899aa'}}]
  };
  Plotly.react(div,[trace],layout,{responsive:true,displayModeBar:false});
}

function renderTables() {
  const pmos=currentFilter==='Todos'?DATA.pmos:[currentFilter];
  let h='<table><tr><th>Mês</th>'+pmos.map(p=>'<th>'+p+'</th>').join('')+'<th>Total</th></tr>';
  DATA.months.forEach(m=>{
    h+='<tr><td>'+fmtMonth(m)+'</td>';
    let rt=0;
    pmos.forEach(p=>{const v=(DATA.monthly.by_pmo[m]||{})[p]||0;rt+=v;h+='<td>'+fmtBRL(v)+'</td>';});
    h+='<td style="font-weight:600;color:#fff">'+fmtBRL(rt)+'</td></tr>';
  });
  h+='<tr style="border-top:2px solid #2a3f5f;font-weight:600;color:#fff"><td>Total</td>';
  let gt=0;
  pmos.forEach(p=>{let s=0;DATA.months.forEach(m=>s+=(DATA.monthly.by_pmo[m]||{})[p]||0);gt+=s;h+='<td>'+fmtBRL(s)+'</td>';});
  h+='<td>'+fmtBRL(gt)+'</td></tr></table>';
  document.getElementById('monthlyTable').innerHTML=h;

  let h2='<table><tr><th>Mês</th>'+DATA.warehouses.map(w=>'<th style="font-size:9px">'+w+'</th>').join('')+'<th>Total</th></tr>';
  DATA.months.forEach(m=>{
    h2+='<tr><td>'+fmtMonth(m)+'</td>';
    let rt=0;
    DATA.warehouses.forEach(w=>{const v=(DATA.monthly.by_warehouse[m]||{})[w]||0;rt+=v;h2+='<td>'+(v>0?fmtK(v):'-')+'</td>';});
    h2+='<td style="font-weight:600;color:#fff">'+fmtBRL(rt)+'</td></tr>';
  });
  h2+='</table>';
  document.getElementById('whTable').innerHTML=h2;
}

function setFilter(f) {
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===f));
  renderAll();
}
function setView(v) {
  currentView=v;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===(v==='weekly'?'Semanal':'Mensal')));
  renderAll();
}
function updateMeta() {
  const raw=document.getElementById('metaInput').value.replace(/[^\d,.]/g,'').replace(/\./g,'').replace(',','.');
  weeklyTarget=parseFloat(raw)||375000;
  document.getElementById('metaInput').value=weeklyTarget.toLocaleString('pt-BR',{minimumFractionDigits:2});
  renderAll();
}
function renderAll() { renderCards(); renderEvolution(); renderPMO(); renderWarehouse(); renderTables(); }
renderAll();
</script>
